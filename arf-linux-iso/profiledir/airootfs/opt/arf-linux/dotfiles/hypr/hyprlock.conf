general {
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    path = $HOME/.config/hypr/wallpaper/hyprlock2.png
    blur_size = 5
    blur_passes = 2
    noise = 0.01
    contrast = 1.2
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(7aa2f7)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, 200
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = rgb(c0caf5)
    font_size = 94
    font_family = Hack Nerd Font
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b> $(date +'%A, %-d %B %Y') </b>"
    color = rgb(7aa2f7)
    font_size = 28
    font_family = Hack Nerd Font
    position = 0, -120
    halign = center
    valign = top
}

label {
    monitor =
    text =   $USER
    color = rgb(7dcfff)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, 100
    halign = center
    valign = bottom
}
